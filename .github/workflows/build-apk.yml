name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          # 如果有现有项目，先备份 lib 和 pubspec
          mkdir -p /tmp/backup
          cp -r lib pubspec.yaml /tmp/backup/ 2>/dev/null || true

          # 生成全新项目
          flutter create --org com.example .

          # 恢复备份（如果有）
          [ -d /tmp/backup/lib ] && cp -r /tmp/backup/lib .
          [ -f /tmp/backup/pubspec.yaml ] && cp /tmp/backup/pubspec.yaml .

          # 为了简化，强制替换 main.dart 为计数器示例（见下）
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
                  title: 'Auto Quiz',
                  theme: ThemeData(primarySwatch: Colors.blue),
                  home: const MyHomePage(),
                );
          }

          class MyHomePage extends StatefulWidget {
            const MyHomePage({super.key});
            @override
            State<MyHomePage> createState() => _MyHomePageState();
          }

          class _MyHomePageState extends State<MyHomePage> {
            int _counter = 0;
            void _incrementCounter() => setState(() => _counter++);
            @override
            Widget build(BuildContext context) => Scaffold(
                  appBar: AppBar(title: const Text('Auto Quiz Test')),
                  body: Center(child: Text('$_counter')),
                  floatingActionButton: FloatingActionButton(
                    onPressed: _incrementCounter,
                    child: const Icon(Icons.add),
                  ),
                );
          }
          EOF

          # 可选：如果需要 http 依赖，取消下面注释
          # sed -i '/dependencies:/a\  http: ^1.1.0' pubspec.yaml

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
