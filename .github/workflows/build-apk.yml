name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          # 备份现有 lib 和 pubspec
          mkdir -p /tmp/backup
          cp -r lib pubspec.yaml /tmp/backup/ 2>/dev/null || true

          # 生成基础项目（不修改任何 Gradle 文件）
          flutter create --org com.example .

          # 恢复备份
          [ -d /tmp/backup/lib ] && cp -r /tmp/backup/lib .
          [ -f /tmp/backup/pubspec.yaml ] && cp /tmp/backup/pubspec.yaml .

          # 添加插件依赖到 pubspec.yaml
          sed -i '/dependencies:/a\  screenshot: ^2.1.0' pubspec.yaml
          sed -i '/dependencies:/a\  google_ml_kit: ^0.16.0' pubspec.yaml
          sed -i '/dependencies:/a\  http: ^1.1.0' pubspec.yaml
          sed -i '/dependencies:/a\  flutter_overlay_window: ^0.4.0' pubspec.yaml

          # 写入新的 main.dart（使用插件实现功能）
          cat > lib/main.dart << 'EOF'
          import 'dart:async';
          import 'dart:io';
          import 'dart:typed_data';
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:screenshot/screenshot.dart';
          import 'package:google_ml_kit/google_ml_kit.dart';
          import 'package:http/http.dart' as http;
          import 'dart:convert';
          import 'package:flutter_overlay_window/flutter_overlay_window.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
                  title: 'Auto Quiz',
                  theme: ThemeData(primarySwatch: Colors.blue),
                  home: const HomePage(),
                );
          }

          class HomePage extends StatefulWidget {
            const HomePage({super.key});
            @override
            State<HomePage> createState() => _HomePageState();
          }

          class _HomePageState extends State<HomePage> {
            final TextEditingController _apiUrlController = TextEditingController();
            final TextEditingController _apiKeyController = TextEditingController();
            final TextEditingController _modelController = TextEditingController();
            String _status = '等待截屏...';
            bool _isProcessing = false;
            final ScreenshotController _screenshotController = ScreenshotController();

            // 悬浮窗相关
            bool _overlayVisible = true;
            OverlayEntry? _overlayEntry;

            @override
            void initState() {
              super.initState();
              _initOverlay();
              WidgetsBinding.instance.addPostFrameCallback((_) => _showOverlay());
            }

            @override
            void dispose() {
              _hideOverlay();
              super.dispose();
            }

            void _initOverlay() {
              // 初始化悬浮窗权限（Android 需开启）
            }

            void _showOverlay() {
              _hideOverlay();
              final overlay = Overlay.of(context);
              _overlayEntry = OverlayEntry(
                builder: (context) => Positioned(
                  top: 100,
                  right: 10,
                  child: GestureDetector(
                    onPanUpdate: (details) {},
                    child: Material(
                      color: Colors.transparent,
                      child: Container(
                        padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 8),
                        decoration: BoxDecoration(
                          color: Colors.blue.shade700,
                          borderRadius: BorderRadius.circular(20),
                          boxShadow: [BoxShadow(color: Colors.black26, blurRadius: 8)],
                        ),
                        child: Row(
                          mainAxisSize: MainAxisSize.min,
                          children: [
                            const Icon(Icons.quiz, color: Colors.white, size: 20),
                            const SizedBox(width: 8),
                            Text(
                              _isProcessing ? '答题中...' : 'Auto Quiz',
                              style: const TextStyle(color: Colors.white, fontWeight: FontWeight.bold),
                            ),
                            const SizedBox(width: 8),
                            GestureDetector(
                              onTap: _startQuiz,
                              child: Container(
                                padding: const EdgeInsets.symmetric(horizontal: 10, vertical: 4),
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.2),
                                  borderRadius: BorderRadius.circular(12),
                                ),
                                child: const Text('开始', style: TextStyle(color: Colors.white)),
                              ),
                            ),
                            const SizedBox(width: 4),
                            GestureDetector(
                              onTap: _hideOverlay,
                              child: const Icon(Icons.close, color: Colors.white, size: 16),
                            ),
                          ],
                        ),
                      ),
                    ),
                  ),
                ),
              );
              overlay.insert(_overlayEntry!);
            }

            void _hideOverlay() {
              _overlayEntry?.remove();
              _overlayEntry = null;
            }

            // 核心功能：截屏 → OCR → API → 显示答案
            Future<void> _startQuiz() async {
              if (_isProcessing) return;
              if (_apiUrlController.text.isEmpty || _apiKeyController.text.isEmpty) {
                _showToast('请填写API地址和Key');
                return;
              }
              setState(() {
                _isProcessing = true;
                _status = '正在截屏...';
              });
              try {
                // 1. 截屏
                final Uint8List? imageBytes = await _screenshotController.capture();
                if (imageBytes == null) throw Exception('截屏失败');

                // 2. OCR 识别
                setState(() => _status = '识别题目...');
                final text = await _extractText(imageBytes);
                if (text.isEmpty) throw Exception('未识别到文字');

                // 3. 调用 API 获取答案
                setState(() => _status = '获取答案...');
                final answer = await _getAnswer(text);
                if (answer.isEmpty) throw Exception('未获取答案');

                setState(() {
                  _status = '答案: $answer';
                  _isProcessing = false;
                });
                _showToast('答案: $answer');
              } catch (e) {
                setState(() {
                  _status = '错误: $e';
                  _isProcessing = false;
                });
                _showToast('错误: $e');
              }
            }

            // OCR 识别
            Future<String> _extractText(Uint8List imageBytes) async {
              final InputImage inputImage = InputImage.fromBytes(
                bytes: imageBytes,
                inputImageData: InputImageData(
                  size: Size(1080, 1920), // 可根据实际情况调整
                  imageRotation: 0,
                  format: InputImageFormat.NV21,
                ),
              );
              final textDetector = GoogleMlKit.vision.textRecognizer();
              final RecognizedText recognizedText = await textDetector.processImage(inputImage);
              await textDetector.close();
              return recognizedText.text;
            }

            // 调用 API
            Future<String> _getAnswer(String question) async {
              final url = _apiUrlController.text.trim();
              final key = _apiKeyController.text.trim();
              final model = _modelController.text.trim();
              final body = {
                'model': model.isNotEmpty ? model : 'glm-4-plus',
                'messages': [
                  {'role': 'system', 'content': '只返回选项字母（A/B/C/D），不加其他文字。'},
                  {'role': 'user', 'content': question}
                ],
                'max_tokens': 10,
                'temperature': 0.1,
              };
              try {
                final response = await http.post(
                  Uri.parse(url),
                  headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer $key'},
                  body: jsonEncode(body),
                );
                if (response.statusCode == 200) {
                  final data = jsonDecode(response.body);
                  final content = data['choices'][0]['message']['content']?.toString().trim() ?? '';
                  final match = RegExp(r'[A-D]').firstMatch(content.toUpperCase());
                  return match?.group(0) ?? content;
                }
                return '';
              } catch (_) {
                return '';
              }
            }

            void _showToast(String msg) {
              ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text(msg)));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Auto Quiz'),
                  backgroundColor: Colors.blue,
                  foregroundColor: Colors.white,
                  actions: [
                    IconButton(
                      icon: const Icon(Icons.help),
                      onPressed: () => showDialog(
                        context: context,
                        builder: (_) => AlertDialog(
                          title: const Text('使用说明'),
                          content: const Text(
                            '1. 开启屏幕录制权限（首次点击"开始"时授权）\n'
                            '2. 填写API配置\n'
                            '3. 打开题目页面，点击悬浮窗"开始"',
                          ),
                          actions: [TextButton(onPressed: () => Navigator.pop(_), child: const Text('知道'))],
                        ),
                      ),
                    ),
                  ],
                ),
                body: Padding(
                  padding: const EdgeInsets.all(16),
                  child: Column(
                    children: [
                      SwitchListTile(
                        title: const Text('显示悬浮窗'),
                        value: _overlayVisible,
                        onChanged: (v) {
                          setState(() {
                            _overlayVisible = v;
                            v ? _showOverlay() : _hideOverlay();
                          });
                        },
                      ),
                      TextField(
                        controller: _apiUrlController,
                        decoration: const InputDecoration(
                          labelText: 'API 地址',
                          hintText: 'https://open.bigmodel.cn/api/paas/v4/',
                          border: OutlineInputBorder(),
                        ),
                      ),
                      const SizedBox(height: 12),
                      TextField(
                        controller: _apiKeyController,
                        decoration: const InputDecoration(
                          labelText: 'API Key',
                          hintText: '粘贴你的 Key',
                          border: OutlineInputBorder(),
                        ),
                      ),
                      const SizedBox(height: 12),
                      TextField(
                        controller: _modelController,
                        decoration: const InputDecoration(
                          labelText: '模型（可选）',
                          hintText: 'glm-4-plus',
                          border: OutlineInputBorder(),
                        ),
                      ),
                      const SizedBox(height: 20),
                      SizedBox(
                        width: double.infinity,
                        child: ElevatedButton(
                          onPressed: _isProcessing ? null : _startQuiz,
                          child: Text(_isProcessing ? '处理中...' : '开始答题'),
                        ),
                      ),
                      const SizedBox(height: 16),
                      Container(
                        padding: const EdgeInsets.all(12),
                        color: Colors.grey.shade100,
                        child: Row(children: [const Text('状态: '), Expanded(child: Text(_status))]),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
