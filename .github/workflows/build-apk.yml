name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Regenerate Flutter project
        run: |
          mkdir -p /tmp/backup
          cp -r lib pubspec.yaml /tmp/backup/
          flutter create --org com.example .
          cp -r /tmp/backup/lib .
          cp /tmp/backup/pubspec.yaml .
      
      - run: flutter pub get
      
      - run: flutter build apk --debug
      
      # ⭐ 关键：上传 APK 到 Artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
