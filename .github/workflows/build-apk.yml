name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Regenerate Flutter project
        run: |
          mkdir -p /tmp/backup
          cp -r lib pubspec.yaml /tmp/backup/
          flutter create --org com.example .
          cp -r /tmp/backup/lib .
          cp /tmp/backup/pubspec.yaml .
      
      - name: Add accessibility service files
        run: |
          # 创建 res/xml 目录
          mkdir -p android/app/src/main/res/xml
          
          # 写入 accessibility_service_config.xml
          cat > android/app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault|flagRetrieveInteractiveWindows"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:description="@string/app_name" />
          EOF
          
          # 创建 kotlin 源码目录
          mkdir -p android/app/src/main/kotlin/com/example/auto_quiz
          
          # 写入 AutoClickService.kt
          cat > android/app/src/main/kotlin/com/example/auto_quiz/AutoClickService.kt << 'EOF'
          package com.example.auto_quiz
          
          import android.accessibilityservice.AccessibilityService
          import android.accessibilityservice.GestureDescription
          import android.graphics.Path
          import android.os.Build
          import android.view.accessibility.AccessibilityEvent
          import android.view.accessibility.AccessibilityNodeInfo
          
          class AutoClickService : AccessibilityService() {
          
              companion object {
                  var instance: AutoClickService? = null
              }
          
              override fun onServiceConnected() {
                  super.onServiceConnected()
                  instance = this
              }
          
              override fun onAccessibilityEvent(event: AccessibilityEvent?) {}
          
              override fun onInterrupt() {}
          
              fun performClick(x: Float, y: Float) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                      val path = Path()
                      path.moveTo(x, y)
                      val stroke = GestureDescription.StrokeDescription(path, 0, 1)
                      val builder = GestureDescription.Builder()
                      builder.addStroke(stroke)
                      dispatchGesture(builder.build(), null, null)
                  }
              }
          
              fun clickButtonByText(text: String): Boolean {
                  val root = rootInActiveWindow ?: return false
                  val nodes = root.findAccessibilityNodeInfosByText(text)
                  for (node in nodes) {
                      if (node.isClickable) {
                          node.performAction(AccessibilityNodeInfo.ACTION_CLICK)
                          return true
                      }
                  }
                  return false
              }
          
              override fun onDestroy() {
                  instance = null
                  super.onDestroy()
              }
          }
          EOF
      
      # ⭐ 方法升级：直接覆盖 AndroidManifest.xml，而不是用 sed 打补丁
      - name: Override AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          
              <!-- 权限声明 -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />
          
              <application
                  android:label="Auto Quiz"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
          
                  <!-- 无障碍服务注册 -->
                  <service
                      android:name=".AutoClickService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_service_config" />
                  </service>
          
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
      
      - run: flutter pub get
      
      - run: flutter build apk --debug
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
